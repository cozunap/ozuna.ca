backend:
  name: github
  repo: cozunap/ozuna.ca
  base_url: https://ozuna.pages.dev
  auth_endpoint: auth
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "work"
    label: "Work"
    folder: "src/content/work"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["web", "graphic"]}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}
  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/home.md"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Hero Title HTML", name: "heroTitle", widget: "text"}
          - {label: "Background Video", name: "backgroundVideo", widget: "file", required: false}
          - label: "Buttons"
            name: "buttons"
            widget: "list"
            fields:
              - {label: "Button Text", name: "text", widget: "string"}
              - {label: "Link/File", name: "link", widget: "string"}
              - {label: "Open in new tab?", name: "isExternal", widget: "boolean", default: false, required: false}
      - file: "src/content/pages/about.md"
        label: "About Me Page"
        name: "about"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
          - label: "Contact Links"
            name: "contactLinks"
            widget: "list"
            fields:
              - {label: "Link Text", name: "text", widget: "string"}
              - {label: "URL/File", name: "link", widget: "string"}
              - {label: "Open in new tab?", name: "isExternal", widget: "boolean", default: false, required: false}
      - file: "src/content/pages/work.md"
        label: "Work Page"
        name: "work"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string", required: false}
      - file: "src/content/pages/contact.md"
        label: "Contact Page"
        name: "contact"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
          - label: "Action Button"
            name: "actionButton"
            widget: "object"
            required: false
            fields:
              - {label: "Button Text", name: "text", widget: "string"}
              - {label: "Email Address / Link", name: "link", widget: "string"}
